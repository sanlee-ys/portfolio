# Dependabot: automated dependency-update PRs.
# https://docs.github.com/code-security/dependabot/dependabot-version-updates
#
# NOTE: only GitHub Actions are tracked here. This repo has no package.json —
# the QA workflow installs playwright ad hoc (`npm install playwright`, no
# lockfile) so there's no manifest for Dependabot to pin or bump. That's a
# real reproducibility gap (the installed version can drift between CI runs),
# but fixing it means adding a package.json/lockfile to the QA workflow — a
# CI change, not a scanning one — out of scope here.
version: 2
updates:
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
    commit-message:
      prefix: "ci"
    groups:
      github-actions:
        update-types: ["minor", "patch"]
