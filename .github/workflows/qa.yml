name: QA

on:
  pull_request:
  push:
    branches: [main]

jobs:
  qa:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v7
        with:
          node-version: 22

      - name: Check internal links
        run: node scripts/link-check.cjs

      - name: Private-repo guard (adversarial suites, A+B and C)
        run: node --test scripts/private-repo-check.test.cjs scripts/private-name-precommit.test.cjs

      - name: Private-repo guard (never name/link/describe a private repo)
        run: node scripts/private-repo-check.cjs
        env:
          # Authenticated read raises the API rate limit; the token can't see
          # other repos' private visibility, and the script filters !private.
          GITHUB_TOKEN: ${{ github.token }}

      # Published figures are quoted from the classifier's eval runs. They used to
      # be retyped by hand, and in July 2026 that put two-prompt-changes-stale
      # numbers on this site and on the résumé. This asserts every marked figure
      # against the producer's generated artifact. A mismatch fails; a fetch
      # failure warns and passes, so an outage cannot redden the build.
      - name: Published metrics match the classifier artifact
        run: node scripts/check-published-metrics.cjs

      # Ports the architecture repo's 'Downstream surfaces' rule down to this repo's
      # ADR tier. Stdlib Python, no venv — this is a static site with no Python
      # toolchain, and a doc linter is not a reason to grow one. All 3 ADRs comply,
      # so it is enforced with zero exceptions.
      # `python3`, not `python`: this job sets up Node, not Python, and only python3
      # is guaranteed on the ubuntu runner image.
      - name: ADRs list their downstream surfaces
        run: python3 scripts/lint_decisions.py

      - name: Install Playwright Chromium
        working-directory: scripts
        run: |
          npm ci
          npx playwright install --with-deps chromium

      - name: Mobile QA gate (no horizontal overflow at 320/360/390/430)
        run: node scripts/mobile-qa.cjs
