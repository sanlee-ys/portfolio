name: QA

on:
  pull_request:
  push:
    branches: [main]

jobs:
  qa:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v7
        with:
          node-version: 22

      - name: Check internal links
        run: node scripts/link-check.cjs

      - name: Private-repo guard (adversarial suites, A+B and C)
        run: node --test scripts/private-repo-check.test.cjs scripts/private-name-precommit.test.cjs

      - name: Private-repo guard (never name/link/describe a private repo)
        run: node scripts/private-repo-check.cjs
        env:
          # Authenticated read raises the API rate limit; the token can't see
          # other repos' private visibility, and the script filters !private.
          GITHUB_TOKEN: ${{ github.token }}

      - name: Install Playwright Chromium
        working-directory: scripts
        run: |
          npm ci
          npx playwright install --with-deps chromium

      - name: Mobile QA gate (no horizontal overflow at 320/360/390/430)
        run: node scripts/mobile-qa.cjs
