name: Claude Review

# AI code-review pilot built on anthropics/claude-code-action@v1.
#
# INERT until two human steps are done (see the PR body for exact commands):
#   1. Install the Claude GitHub App on this repo.
#   2. Add the ANTHROPIC_API_KEY repository secret.
# Until both exist the review job fails auth and the mention flow no-ops.
# Nothing in this file contains or exposes a key.

on:
  # Automated review fires ONCE per PR, on open only.
  #
  # Deliberately NOT `synchronize`: a logged cost incident showed an uncapped
  # fan-out (one run per push) burning API spend. Re-review on demand by
  # commenting `@claude` on the PR instead of re-running on every push.
  pull_request:
    types: [opened]

  # @claude mention flow — the interactive mode the action auto-detects
  # (docs: "automatically detects whether to run in interactive mode ...
  # based on your configuration"). Documented trigger set for mentions.
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]

# Least privilege. The review reads code and writes PR/issue comments; it does
# not push commits, so `contents` stays read-only.
#
# `id-token: write` IS required here, even on the direct Claude API key path.
# An earlier version of this comment claimed otherwise and the job failed on
# every PR with "Could not fetch an OIDC token". The mistake was conflating two
# independent auth axes:
#   - GitHub side: the action trades a GitHub OIDC token for a Claude GitHub
#     App installation token, so it can post comments as the app. This needs
#     `id-token: write` whenever the GitHub App is used — always, here.
#   - Anthropic side: API key vs. Bedrock/Vertex/WIF. Separate concern.
# Docs (action FAQ): "If you're using the default GitHub App authentication,
# you must add the `id-token: write` permission to your workflow ... The OIDC
# token is required in order for the Claude GitHub app to function."
# The only way to avoid it is passing a `github_token` input instead of using
# the app, which would post comments as github-actions[bot] rather than Claude.
#
# `actions: read` lets the review read this PR's other check results (e.g.
# whether `qa` passed) instead of reviewing blind to CI. Read-only: it cannot
# trigger, cancel, or rerun workflows. Carried by the action's own example.
permissions:
  contents: read
  pull-requests: write
  issues: write
  id-token: write
  actions: read

# One in-flight run per PR/issue, so a burst of comments can't stack parallel
# API-spending jobs.
#
# `cancel-in-progress` MUST stay false: this workflow triggers on
# `issue_comment`, and the action posts its own "Claude Code is working..."
# tracking comment as claude[bot]. That comment is an `issue_comment: created`
# event on the same PR, so it lands in this same group. With cancelling on, the
# bot's own progress comment killed the run that posted it, ~16s in, every
# time -- observed on #82 (run 29649688617 cancelled by 29649695453).
#
# The `OWNER` gate below already makes those bot-triggered runs skip both jobs,
# but a run whose jobs all skip STILL cancels the in-flight run in its group.
# Queueing instead of cancelling costs a few seconds of runner time for the
# no-op run and nothing in API spend.
#
# Tradeoff: a genuine burst of `@claude` comments now serializes rather than
# the newest superseding the older ones. Bounded by the OWNER gate.
concurrency:
  group: claude-review-${{ github.event.pull_request.number || github.event.issue.number }}
  cancel-in-progress: false

jobs:
  # --- Automated review when a PR is opened -------------------------------
  # PUBLIC-REPO SECURITY: gated to SAME-REPO PRs. This uses `pull_request`
  # (never `pull_request_target`), so GitHub already withholds secrets from
  # fork PRs — but the gate also stops the job from running (and failing on a
  # missing key) against untrusted fork code, and keeps review on trusted
  # branches only.
  review:
    if: >-
      github.event_name == 'pull_request' &&
      github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    steps:
      # Base ref by default (no `ref:`) — the security-doc "preferred" pattern.
      # Gives Claude the repo files + CLAUDE.md for context.
      - uses: actions/checkout@v7

      - uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          prompt: |
            Review this pull request for a public front-end learning repo
            (static HTML/CSS/JS, no build step, served on GitHub Pages).

            Focus on:
            - Correctness: broken internal links, invalid HTML/CSS/JS, logic
              bugs, accessibility regressions, and the mobile no-horizontal-
              overflow contract described in CLAUDE.md.
            - Security: unsafe innerHTML / injected inline script, mixed
              content, risky external resources, and any leaked secret or
              private-repo name (this repo must never name a private repo).

            Be honest and specific: cite file + line, skip nitpicks that don't
            affect correctness, security, or the mobile contract, and if the PR
            looks clean say so plainly.
          # Cost bounds, both documented CLI passthrough args:
          #   --model     the docs' own examples use `claude-sonnet-5` (a cheap
          #               tier) for review workflows.
          #   --max-turns caps iterations (docs: "Configure appropriate
          #               --max-turns ... to prevent excessive iterations").
          #
          # Raised 8 -> 25 on 2026-07-19. At 8 the action ran out of turns before
          # reaching a verdict on PR #95 (a ~200-line script plus a README) and
          # exited 1 with `"subtype": "error_max_turns"`. It had found nothing and
          # said nothing; the job just went red.
          #
          # That is the failure mode worth naming: the ceiling surfaced as a
          # REVIEW VERDICT. A check that reports red without a finding trains you
          # to ignore it, and an ignored check is worse than an absent one because
          # it still reads as coverage. Same lesson as the metrics guards this
          # repo shipped today, pointed at its own CI.
          #
          # 25 is a ceiling, not a target — the action stops when the review is
          # done, so a clean small PR still costs a handful of turns on a cheap
          # tier. Deliberately NOT `continue-on-error`: a genuine execution
          # failure should still be loud.
          claude_args: |
            --model claude-sonnet-5
            --max-turns 25

  # --- @claude mention flow -----------------------------------------------
  # Owner-gated: on a public repo anyone can comment, so restrict to the repo
  # owner to bound API cost. Broaden via author_association if collaborators
  # should trigger it later.
  mention:
    if: >-
      (github.event_name == 'issue_comment' &&
        contains(github.event.comment.body, '@claude') &&
        github.event.comment.author_association == 'OWNER') ||
      (github.event_name == 'pull_request_review_comment' &&
        contains(github.event.comment.body, '@claude') &&
        github.event.comment.author_association == 'OWNER')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          # No `prompt`: for comment events the action responds to the @claude
          # mention itself (docs: "when omitted for issue/PR comments, Claude
          # responds to trigger phrase").
          claude_args: |
            --model claude-sonnet-5
            --max-turns 8
