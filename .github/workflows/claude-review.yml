name: Claude Review

# AI code-review pilot built on anthropics/claude-code-action@v1.
#
# INERT until two human steps are done (see the PR body for exact commands):
#   1. Install the Claude GitHub App on this repo.
#   2. Add the ANTHROPIC_API_KEY repository secret.
# Until both exist the review job fails auth and the mention flow no-ops.
# Nothing in this file contains or exposes a key.

on:
  # Automated review fires ONCE per PR, on open only.
  #
  # Deliberately NOT `synchronize`: a logged cost incident showed an uncapped
  # fan-out (one run per push) burning API spend. Re-review on demand by
  # commenting `@claude` on the PR instead of re-running on every push.
  pull_request:
    types: [opened]

  # @claude mention flow — the interactive mode the action auto-detects
  # (docs: "automatically detects whether to run in interactive mode ...
  # based on your configuration"). Documented trigger set for mentions.
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]

# Least privilege. The review reads code and writes PR/issue comments; it does
# not push commits, so `contents` stays read-only.
#
# `id-token: write` IS required here, even on the direct Claude API key path.
# An earlier version of this comment claimed otherwise and the job failed on
# every PR with "Could not fetch an OIDC token". The mistake was conflating two
# independent auth axes:
#   - GitHub side: the action trades a GitHub OIDC token for a Claude GitHub
#     App installation token, so it can post comments as the app. This needs
#     `id-token: write` whenever the GitHub App is used — always, here.
#   - Anthropic side: API key vs. Bedrock/Vertex/WIF. Separate concern.
# Docs (action FAQ): "If you're using the default GitHub App authentication,
# you must add the `id-token: write` permission to your workflow ... The OIDC
# token is required in order for the Claude GitHub app to function."
# The only way to avoid it is passing a `github_token` input instead of using
# the app, which would post comments as github-actions[bot] rather than Claude.
#
# `actions: read` lets the review read this PR's other check results (e.g.
# whether `qa` passed) instead of reviewing blind to CI. Read-only: it cannot
# trigger, cancel, or rerun workflows. Carried by the action's own example.
permissions:
  contents: read
  pull-requests: write
  issues: write
  id-token: write
  actions: read

# One in-flight run per PR/issue, so a burst of comments can't stack parallel
# API-spending jobs.
#
# `cancel-in-progress` MUST stay false: this workflow triggers on
# `issue_comment`, and the action posts its own "Claude Code is working..."
# tracking comment as claude[bot]. That comment is an `issue_comment: created`
# event on the same PR, so it lands in this same group. With cancelling on, the
# bot's own progress comment killed the run that posted it, ~16s in, every
# time -- observed on #82 (run 29649688617 cancelled by 29649695453).
#
# The `OWNER` gate below already makes those bot-triggered runs skip both jobs,
# but a run whose jobs all skip STILL cancels the in-flight run in its group.
# Queueing instead of cancelling costs a few seconds of runner time for the
# no-op run and nothing in API spend.
#
# Tradeoff: a genuine burst of `@claude` comments now serializes rather than
# the newest superseding the older ones. Bounded by the OWNER gate.
concurrency:
  group: claude-review-${{ github.event.pull_request.number || github.event.issue.number }}
  cancel-in-progress: false

jobs:
  # --- Automated review when a PR is opened -------------------------------
  # PUBLIC-REPO SECURITY: gated to SAME-REPO PRs. This uses `pull_request`
  # (never `pull_request_target`), so GitHub already withholds secrets from
  # fork PRs — but the gate also stops the job from running (and failing on a
  # missing key) against untrusted fork code, and keeps review on trusted
  # branches only.
  review:
    if: >-
      github.event_name == 'pull_request' &&
      github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    steps:
      # No `ref:` — the security-doc "preferred" pattern: never check out the
      # PR's head branch by name. On a `pull_request` event the default is the
      # MERGE ref (`refs/remotes/pull/N/merge`), so the tree Claude reads is the
      # PR merged into base — its outcome, not its diff. That distinction is
      # load-bearing: reading a file here cannot tell you what the PR changed,
      # which is why the review is told to start from `gh pr diff`. (An earlier
      # version of this comment said "base ref by default", which is wrong and
      # would have had the review reading pre-PR content.)
      - uses: actions/checkout@v7

      # `continue-on-error` so the NEXT step decides this job's colour. The
      # action exits 1 for every non-success subtype, which collapses two very
      # different signals — "the review found problems" and "the review ran out
      # of road" — into the same red X. See ADR-005 and the classify step below.
      # Genuine failures still go red there; nothing is being swallowed.
      - uses: anthropics/claude-code-action@v1
        id: claude
        continue-on-error: true
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          prompt: |
            Review this pull request for a public front-end learning repo
            (static HTML/CSS/JS, no build step, served on GitHub Pages).

            Start with `gh pr diff --name-only`, then `gh pr diff` for the
            content. The checkout is the MERGE RESULT, so reading a file shows
            you its final state, not what this PR did to it — the diff is the
            only thing that tells you what changed.

            Scope, in priority order:
            - Skip pure moves. A file whose diff is a rename with no content
              change needs no read. Internal-link integrity across a move is
              already enforced by `scripts/link-check.cjs` in the QA job; do
              not re-derive it by hand. Spend the budget on content diffs.
            - Correctness: broken internal links, invalid HTML/CSS/JS, logic
              bugs, accessibility regressions, and the mobile no-horizontal-
              overflow contract described in CLAUDE.md.
            - Security: unsafe innerHTML / injected inline script, mixed
              content, risky external resources, and any leaked secret or
              private-repo name (this repo must never name a private repo).

            Post as you go rather than saving it all for the end: use
            `mcp__github_inline_comment__create_inline_comment` for anything
            you can pin to a file and line, and close with ONE summary comment
            via `gh pr comment`. If you are running short on turns, post the
            summary immediately — a partial review that is posted beats a
            thorough one that never lands.

            Be honest and specific: skip nitpicks that don't affect
            correctness, security, or the mobile contract, and if the PR looks
            clean say so plainly.
          # --model      the docs' own examples use `claude-sonnet-5` (a cheap
          #              tier) for review workflows.
          # --max-turns  caps iterations (docs: "Configure appropriate
          #              --max-turns ... to prevent excessive iterations").
          # --allowedTools  THE FIX. Agent mode grants no Bash and installs no
          #              GitHub comment MCP server unless the tools are named
          #              here (see src/modes/agent/index.ts + src/mcp/
          #              install-mcp-server.ts: `shouldIncludeCommentServer =
          #              !isAgentMode || hasGitHubCommentTools`). Without this
          #              line the review agent could not read the diff and had
          #              no channel to publish a finding on. From #81 (the
          #              2026-07-13 pilot) to #101 it never posted one comment
          #              on one PR: every green check was a silent no-op, and
          #              every red one was the same no-op that took more turns
          #              to give up. Tool list mirrors the action's own
          #              examples/pr-review-comprehensive.yml.
          #
          # max-turns was 25, on the theory that denied tool calls -- not the
          # ceiling -- were the binding constraint: of the 26 turns PR #101
          # spent, 11 were denials returning nothing. That line invited its own
          # test ("if 25 still exhausts, the classify step says so honestly and
          # we tune against real numbers instead of guessing again").
          #
          # It exhausted. PR #105 was a 2-file, 123-line diff -- far smaller
          # than #101 -- and hit the ceiling at 26 turns with **0 denials**.
          # That is the real number the old comment asked for, and it falsifies
          # the denials-only hypothesis: with the tool grant fixed, a small diff
          # still needs more than 25 turns to read, judge, and publish.
          #
          # 40 is sized from that measurement, not guessed: ~26 turns bought
          # context-gathering on a small diff, so a large one plus the
          # comment-posting turns needs roughly half again. The classify step
          # still reports honestly if 40 exhausts, so this stays tunable
          # against evidence rather than becoming a number nobody may touch.
          claude_args: |
            --model claude-sonnet-5
            --max-turns 40
            --allowedTools "Bash(gh pr diff:*),Bash(gh pr view:*),Bash(gh pr comment:*),mcp__github_inline_comment__create_inline_comment"

      # Turn "the action exited non-zero" into a signal that distinguishes
      # I-found-problems from I-ran-out-of-road. See ADR-005 for the reasoning.
      #
      # Inline rather than a `.github/scripts/` file on purpose: the Claude App
      # refuses to run when the workflow file differs from the copy on the
      # default branch, and that validation covers THIS file only. A separate
      # script would be an unvalidated input to a job holding a
      # `pull-requests: write` token.
      - name: Classify the review outcome
        if: always()
        env:
          GH_TOKEN: ${{ github.token }}
          PR: ${{ github.event.pull_request.number }}
          EXEC_FILE: ${{ steps.claude.outputs.execution_file }}
          STEP_OUTCOME: ${{ steps.claude.outcome }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          set -euo pipefail

          # No execution file means Claude never ran. The common cause is the
          # workflow-validation skip that fires on any PR editing this file —
          # that is a legitimate skip, not a failure.
          if [ -z "${EXEC_FILE:-}" ] || [ ! -f "$EXEC_FILE" ]; then
            if [ "$STEP_OUTCOME" = "success" ]; then
              echo "No execution file; the action skipped itself (workflow validation). Nothing to classify."
              exit 0
            fi
            echo "::error::Claude review failed before it produced an execution file."
            exit 1
          fi

          # The file is the SDK message log; the terminal `result` message
          # carries the verdict. Tolerate a bare object in case that changes.
          RESULT=$(jq -c 'if type == "array" then (map(select(.type == "result")) | last) else . end' "$EXEC_FILE")
          SUBTYPE=$(jq -r '.subtype // "unknown"' <<<"$RESULT")
          TURNS=$(jq -r '.num_turns // 0' <<<"$RESULT")
          DENIALS=$(jq -r '.permission_denials_count // 0' <<<"$RESULT")
          COST=$(jq -r '(.total_cost_usd // 0) * 10000 | round / 10000' <<<"$RESULT")

          echo "subtype=$SUBTYPE turns=$TURNS denials=$DENIALS cost_usd=$COST"

          # A denial is a bug in the --allowedTools line above, not a finding
          # about the PR. Denied calls burn turns and return nothing, which is
          # exactly how this gate looked busy while doing nothing. Surface them:
          # `show_full_output` stays off (the transcript is public and may carry
          # secrets), so this count is the only view we get into the denials.
          if [ "$DENIALS" -gt 0 ]; then
            echo "::warning::The review agent was denied $DENIALS tool call(s). Widen --allowedTools in this workflow — denied calls burn turns and produce nothing."
          fi

          case "$SUBTYPE" in
            success)
              echo "Review completed in $TURNS turns."
              ;;
            error_max_turns)
              gh pr comment "$PR" --body "$(cat <<EOF
          ### Automated review inconclusive — this is not a verdict on the PR

          The review agent hit its turn ceiling after **$TURNS turns** and stopped
          before finishing. **Nothing in this PR has been reviewed.** Treat this
          check as *absent* — not as passed, and not as failed.

          | | |
          |---|---|
          | turns used | $TURNS |
          | tool calls denied | $DENIALS |
          | cost | \$$COST |
          | run | [$GITHUB_RUN_ID]($RUN_URL) |

          Re-run it by commenting \`@claude\` on this PR. If \`tool calls denied\`
          above is non-zero, fix \`--allowedTools\` in
          \`.github/workflows/claude-review.yml\` first — that is where the budget
          went, and re-running without fixing it will exhaust the same way.
          EOF
          )"
              echo "::warning::Review inconclusive: hit the turn ceiling at $TURNS turns. Posted an inconclusive comment on the PR; not failing the job — an unreviewed PR is not a rejected PR."
              ;;
            *)
              echo "::error::Claude review failed with subtype '$SUBTYPE' after $TURNS turns. This is an execution failure, not a review verdict."
              exit 1
              ;;
          esac

  # --- @claude mention flow -----------------------------------------------
  # Owner-gated: on a public repo anyone can comment, so restrict to the repo
  # owner to bound API cost. Broaden via author_association if collaborators
  # should trigger it later.
  mention:
    if: >-
      (github.event_name == 'issue_comment' &&
        contains(github.event.comment.body, '@claude') &&
        github.event.comment.author_association == 'OWNER') ||
      (github.event_name == 'pull_request_review_comment' &&
        contains(github.event.comment.body, '@claude') &&
        github.event.comment.author_association == 'OWNER')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          # No `prompt`: for comment events the action responds to the @claude
          # mention itself (docs: "when omitted for issue/PR comments, Claude
          # responds to trigger phrase").
          #
          # This job posts fine without `--allowedTools` — tag mode installs the
          # comment server unconditionally, which is why the only claude[bot]
          # comments this repo has ever received came from here and not from the
          # review job. But it shares the review job's blind spot: no Bash means
          # no diff, so it was answering "review this PR" from the merged file
          # tree with no idea what the PR changed. Same grant, read-only subset;
          # it does not need `gh pr comment` because the comment server is its
          # channel.
          #
          # max-turns was 8, reasoned as "a deliberate hard cap on an
          # owner-triggered, CONVERSATIONAL flow." That reasoning was right for
          # the flow it described and wrong for the one that actually arrived.
          # ADR-005 made `@claude` the documented remediation for an
          # inconclusive review — both CLAUDE.md and the review job's own
          # failure message say to re-run that way — which points a full-review
          # workload at a ceiling one third the size of the job that just
          # exhausted doing it. Observed on PR #105: the re-run died at 8 turns
          # having posted only a checklist of what it intended to review. The
          # documented escape hatch failed harder than the thing it escapes.
          #
          # Matched to the review job's 40. A mention is still owner-only and
          # human-rate-limited, so the cost guard here is the trigger, not the
          # turn count. If this ever needs to stay small, the fix is to change
          # the remediation ADR-005 documents — not to leave the two out of sync.
          claude_args: |
            --model claude-sonnet-5
            --max-turns 40
            --allowedTools "Bash(gh pr diff:*),Bash(gh pr view:*)"
