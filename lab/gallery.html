  <script>
    (function () {
      try {
        var saved = localStorage.getItem("theme");
        var t = saved || (window.matchMedia && window.matchMedia("(prefers-color-scheme: light)").matches ? "light" : "dark");
        document.documentElement.setAttribute("data-theme", t);
      } catch (e) { document.documentElement.setAttribute("data-theme", "dark"); }
    })();
  </script>
  <style>
    /* ----- Masonry grid -----
       CSS multi-column layout is the simplest real masonry: the browser fills
       columns and balances them. `columns: 220px` means "as many 220px-wide
       columns as fit", so it is responsive with zero media queries.
       break-inside: avoid stops a photo being split across two columns. */
    .gallery { columns: 220px; column-gap: 12px; margin: 28px 0; }
    .gallery-item {
      display: block;
      break-inside: avoid;
      margin: 0 0 12px;
      border-radius: 10px;
      overflow: hidden;
      border: 1px solid var(--border);
    }
    .gallery-item img {
      width: 100%;
      height: auto;
      display: block;
      transition: transform 0.3s ease;
    }
    .gallery-item:hover img,
    .gallery-item:focus-visible img { transform: scale(1.03); }
    .gallery-item:focus-visible { outline: 2px solid var(--accent); outline-offset: 3px; }

    /* ----- Lightbox -----
       A fixed dark overlay above everything. It is intentionally dark in both
       themes (an immersive viewer), so these colors are literal, not tokens. */
    .lightbox {
      position: fixed;
      inset: 0;
      z-index: 50;
      display: flex;
      align-items: center;
      justify-content: center;
      background: rgba(0, 0, 0, 0.92);
      padding: 24px;
    }
    .lightbox[hidden] { display: none; }
    .lb-figure {
      margin: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      max-width: min(1100px, 92vw);
    }
    .lb-img {
      max-width: 100%;
      max-height: 80vh;
      width: auto;
      height: auto;
      border-radius: 8px;
    }
    .lb-caption { color: #cbd2dd; font-size: 0.9rem; margin-top: 12px; text-align: center; }
    .lb-close, .lb-prev, .lb-next {
      position: absolute;
      width: 44px;
      height: 44px;
      border: none;
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.12);
      color: #fff;
      font-size: 1.5rem;
      line-height: 1;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .lb-close:hover, .lb-prev:hover, .lb-next:hover { background: rgba(255, 255, 255, 0.24); }
    .lb-close:focus-visible, .lb-prev:focus-visible, .lb-next:focus-visible { outline: 2px solid #fff; outline-offset: 2px; }
    .lb-close { top: 18px; right: 18px; }
    .lb-prev { left: 18px; top: 50%; transform: translateY(-50%); }
    .lb-next { right: 18px; top: 50%; transform: translateY(-50%); }

    @media (prefers-reduced-motion: reduce) { .gallery-item img { transition: none; } }
  </style>

<body>
  <button id="theme-toggle" class="theme-toggle" aria-label="Toggle light/dark theme" title="Toggle theme">
    <span class="theme-icon-dark">&#9789;</span>
    <span class="theme-icon-light">&#9728;</span>
  </button>

  <main class="wrap article-body">
    <a class="back" href="index.html">&larr; Back to the lab</a>
    <h1>Photo gallery <span class="badge">Tier 2</span></h1>
    <p class="subtitle">
      A masonry grid plus a keyboard-accessible lightbox, hand-built in vanilla
      HTML, CSS, and JS. The layout is pure CSS columns; the lightbox is about
      sixty lines of commented JavaScript. A few of my own frames.
      <a href="https://vsco.co/sanlee">More on VSCO &rarr;</a>
    </p>

    <!-- The grid. Each thumbnail is a real link to the full-size image, so with
         JavaScript off it still opens the photo. The script below intercepts the
         click and opens the lightbox instead: progressive enhancement. -->
    <div class="gallery" id="gallery">
      <a class="gallery-item" href="../assets/img/photo-pavilion-spring.jpeg">
        <img src="../assets/img/photo-pavilion-spring.jpeg" alt="A pavilion over a pond in spring bloom" loading="lazy" />
      </a>
      <a class="gallery-item" href="../assets/img/photo-jeju.jpeg">
        <img src="../assets/img/photo-jeju.jpeg" alt="Basalt sea cliffs on Jeju Island" loading="lazy" />
      </a>
      <a class="gallery-item" href="../assets/img/photo-lanterns.jpeg">
        <img src="../assets/img/photo-lanterns.jpeg" alt="Lotus lanterns at a temple" loading="lazy" />
      </a>
      <a class="gallery-item" href="../assets/img/photo-trail.jpeg">
        <img src="../assets/img/photo-trail.jpeg" alt="A trail overlook in the mountains" loading="lazy" />
      </a>
      <a class="gallery-item" href="../assets/img/photo-light.jpeg">
        <img src="../assets/img/photo-light.jpeg" alt="A spiral light-and-architecture installation" loading="lazy" />
      </a>
      <a class="gallery-item" href="../assets/img/photo-ftx.jpeg">
        <img src="../assets/img/photo-ftx.jpeg" alt="Inside a helicopter during a field exercise" loading="lazy" />
      </a>
    </div>

    <!-- The lightbox overlay, hidden until a thumbnail is clicked. role=dialog +
         aria-modal tell assistive tech this is a modal layer. -->
    <div class="lightbox" id="lightbox" role="dialog" aria-modal="true" aria-label="Photo viewer" hidden>
      <button class="lb-close" type="button" aria-label="Close (Escape)">&times;</button>
      <button class="lb-prev" type="button" aria-label="Previous photo (left arrow)">&lsaquo;</button>
      <figure class="lb-figure">
        <img class="lb-img" id="lb-img" alt="" />
        <figcaption class="lb-caption" id="lb-caption"></figcaption>
      </figure>
      <button class="lb-next" type="button" aria-label="Next photo (right arrow)">&rsaquo;</button>
    </div>
  </main>

  <script src="../assets/theme.js"></script>
  <script>
    // ----- Lightbox behavior (progressive enhancement) -----
    // The gallery already works without this script: the thumbnails are links
    // that open the full image. Here we upgrade them into an in-page viewer with
    // keyboard control and a focus trap.
    (function () {
      var gallery = document.getElementById("gallery");
      var lightbox = document.getElementById("lightbox");
      if (!gallery || !lightbox) return;

      var lbImg = document.getElementById("lb-img");
      var lbCaption = document.getElementById("lb-caption");
      var closeBtn = lightbox.querySelector(".lb-close");
      var prevBtn = lightbox.querySelector(".lb-prev");
      var nextBtn = lightbox.querySelector(".lb-next");

      // Build the slide list from the gallery's links: each carries a full-size
      // src (its href) and a caption (its image's alt text).
      var links = Array.prototype.slice.call(gallery.querySelectorAll(".gallery-item"));
      var slides = links.map(function (a) {
        var img = a.querySelector("img");
        return { src: a.getAttribute("href"), caption: img ? img.getAttribute("alt") : "" };
      });

      var current = 0;
      var lastFocused = null; // what to refocus when the lightbox closes

      function show(i) {
        current = (i + slides.length) % slides.length; // wrap around both ends
        lbImg.setAttribute("src", slides[current].src);
        lbImg.setAttribute("alt", slides[current].caption);
        lbCaption.textContent = slides[current].caption;
      }

      function open(i) {
        lastFocused = document.activeElement;
        show(i);
        lightbox.hidden = false;
        document.body.style.overflow = "hidden"; // lock the page behind the modal
        closeBtn.focus();
        document.addEventListener("keydown", onKey);
      }

      function close() {
        lightbox.hidden = true;
        document.body.style.overflow = "";
        document.removeEventListener("keydown", onKey);
        if (lastFocused) lastFocused.focus(); // return focus to the thumbnail
      }

      function onKey(e) {
        if (e.key === "Escape") close();
        else if (e.key === "ArrowRight") show(current + 1);
        else if (e.key === "ArrowLeft") show(current - 1);
        else if (e.key === "Tab") trapFocus(e);
      }

      // Keep Tab focus inside the dialog while it is open.
      function trapFocus(e) {
        var f = lightbox.querySelectorAll("button");
        var first = f[0], last = f[f.length - 1];
        if (e.shiftKey && document.activeElement === first) { e.preventDefault(); last.focus(); }
        else if (!e.shiftKey && document.activeElement === last) { e.preventDefault(); first.focus(); }
      }

      links.forEach(function (a, i) {
        a.addEventListener("click", function (e) { e.preventDefault(); open(i); });
      });
      closeBtn.addEventListener("click", close);
      prevBtn.addEventListener("click", function () { show(current - 1); });
      nextBtn.addEventListener("click", function () { show(current + 1); });
      // Click the dark backdrop (but not the photo) to close.
      lightbox.addEventListener("click", function (e) { if (e.target === lightbox) close(); });
    })();
  </script>
</body>
